general {
    ignore_dbus_inhibit = false
}

listener {
    timeout = 20
    on-timeout = brightnessctl -s set 5%
    on-resume = brightnessctl -r
}

listener {
    timeout = 40
    on-timeout = brightnessctl set 0%
    on-resume = brightnessctl -r
}

listener {
    timeout = 600
    on-timeout = systemctl poweroff
}
